server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3307/auth_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}"
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_local_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}